<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Séance Pierre</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0f0f13;--card:#1a1a24;--border:#2a2a38;
    --teal:#00c9b1;--teal-dim:#007a6c;
    --text:#e8e8f0;--muted:#666;--warn:#ff6b6b;
    --done:#00c9b1;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}

  /* TOP BAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1rem 0.5rem;position:sticky;top:0;background:var(--bg);z-index:10;}
  .topbar .menu{font-size:1.4rem;cursor:pointer;color:var(--muted);}
  .workout-timer{font-size:1.3rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px;}
  .rest-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.85rem;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;}
  .rest-btn .icon{font-size:1rem;}

  /* REST TIMER OVERLAY */
  .rest-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
  .rest-overlay.active{display:flex;}
  .rest-circle{width:180px;height:180px;border-radius:50%;border:4px solid var(--teal);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
  .rest-circle svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
  .rest-circle circle{fill:none;stroke:var(--teal);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
  .rest-count{font-size:3rem;font-weight:800;font-variant-numeric:tabular-nums;position:relative;z-index:1;}
  .rest-label{font-size:0.85rem;color:var(--muted);position:relative;z-index:1;}
  .rest-label2{font-size:1rem;font-weight:600;color:var(--teal);}
  .rest-skip{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 32px;border-radius:30px;font-size:1rem;cursor:pointer;margin-top:1rem;}

  /* EXERCISE STRIP */
  .ex-strip{display:flex;gap:8px;padding:0.75rem 1rem;overflow-x:auto;scrollbar-width:none;}
  .ex-strip::-webkit-scrollbar{display:none;}
  .ex-thumb{min-width:64px;height:64px;border-radius:10px;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;flex-shrink:0;transition:border-color 0.2s;}
  .ex-thumb.active{border-color:var(--teal);}
  .ex-thumb.done-ex{border-color:var(--teal-dim);opacity:0.6;}

  /* MAIN ILLUSTRATION */
  .ex-visual{padding:0 1rem;display:flex;align-items:center;justify-content:center;min-height:160px;}
  .ex-visual .big-emoji{font-size:7rem;filter:drop-shadow(0 4px 24px rgba(0,201,177,0.2));}

  /* EXERCISE INFO */
  .ex-info{padding:0.5rem 1rem 0.25rem;}
  .ex-info h2{font-size:1.4rem;font-weight:800;}
  .ex-info .muscle{color:var(--muted);font-size:0.85rem;margin-top:2px;}
  .ex-info .warn-badge{display:inline-block;background:#3a1a1a;color:var(--warn);font-size:0.72rem;padding:2px 8px;border-radius:10px;margin-top:6px;}

  /* SETS TABLE */
  .sets-section{padding:0.75rem 1rem;flex:1;}
  .sets-header{display:grid;grid-template-columns:28px 1fr 1fr 48px;gap:8px;color:var(--muted);font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding:0 4px;}
  .sets-header .kg-sub{font-size:0.65rem;font-weight:400;color:#555;}
  .set-row{display:grid;grid-template-columns:28px 1fr 1fr 48px;gap:8px;align-items:center;padding:8px 4px;border-radius:10px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);transition:background 0.2s,border-color 0.2s;}
  .set-row.done{background:#0d2b27;border-color:var(--teal-dim);}
  .set-num{font-size:0.85rem;font-weight:700;color:var(--muted);text-align:center;}
  .set-val{background:#111118;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:0.95rem;font-weight:600;text-align:center;color:var(--text);outline:none;width:100%;}
  .set-row.done .set-val{color:var(--teal);}
  .set-check{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;justify-self:center;transition:all 0.2s;font-size:1rem;}
  .set-check.checked{background:var(--teal);border-color:var(--teal);}
  .add-rm{display:flex;gap:8px;margin-top:8px;}
  .add-rm button{flex:1;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1.2rem;cursor:pointer;}

  /* BOTTOM NAV */
  .bottom{padding:1rem;display:flex;gap:10px;position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 30%);}
  .btn-prev{flex:0 0 52px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:1.2rem;cursor:pointer;}
  .btn-next{flex:1;background:var(--teal);border:none;border-radius:14px;color:#000;font-size:1rem;font-weight:700;cursor:pointer;padding:14px;}
  .btn-next:disabled{background:var(--teal-dim);color:#555;}

  /* DAY SELECTOR */
  .day-sel{display:flex;gap:8px;padding:0.5rem 1rem;overflow-x:auto;scrollbar-width:none;}
  .day-sel::-webkit-scrollbar{display:none;}
  .day-pill{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.8rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .day-pill.active{background:var(--teal);border-color:var(--teal);color:#000;font-weight:700;}

  /* FINISH SCREEN */
  .finish{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:1rem;padding:2rem;text-align:center;}
  .finish.active{display:flex;}
  .finish .trophy{font-size:5rem;}
  .finish h2{font-size:1.8rem;font-weight:800;}
  .finish p{color:var(--muted);}
  .finish .stats{display:flex;gap:2rem;margin-top:1rem;}
  .finish .stat{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .finish .stat-val{font-size:1.5rem;font-weight:800;color:var(--teal);}
  .finish .stat-lbl{font-size:0.75rem;color:var(--muted);}
  .finish button{background:var(--teal);border:none;border-radius:14px;color:#000;font-size:1rem;font-weight:700;padding:14px 32px;cursor:pointer;margin-top:1rem;}
</style>
</head>
<body>

<!-- REST OVERLAY -->
<div class="rest-overlay" id="restOverlay">
  <div class="rest-label2" id="restExLabel"></div>
  <div class="rest-circle">
    <svg viewBox="0 0 180 180"><circle id="restArc" cx="90" cy="90" r="86" stroke-dasharray="540" stroke-dashoffset="0"/></svg>
    <div class="rest-count" id="restCount">90</div>
    <div class="rest-label">récupération</div>
  </div>
  <button class="rest-skip" onclick="skipRest()">Passer ⏭</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <span class="menu">☰</span>
  <span class="workout-timer" id="workoutTimer">00:00:00</span>
  <button class="rest-btn" id="manualRestBtn" onclick="startRest(currentRestSec, '⏱ Manuel')">
    <span class="icon">⏱</span>
    <span id="restBtnLabel">2:00</span>
  </button>
</div>

<!-- DAY SELECTOR -->
<div class="day-sel" id="daySel"></div>

<!-- EXERCISE STRIP -->
<div class="ex-strip" id="exStrip"></div>

<!-- MAIN -->
<div id="mainView">
  <div class="ex-visual"><div class="big-emoji" id="exEmoji">🏋️</div></div>
  <div class="ex-info">
    <h2 id="exName">—</h2>
    <div class="muscle" id="exMuscle">—</div>
    <div class="warn-badge" id="exWarn" style="display:none"></div>
  </div>
  <div class="sets-section">
    <div class="sets-header">
      <span>#</span><span>Rép.</span>
      <span>Kg<div class="kg-sub">charge réf.</div></span>
      <span>✓</span>
    </div>
    <div id="setsList"></div>
    <div class="add-rm">
      <button onclick="removeSet()">−</button>
      <button onclick="addSet()">+</button>
    </div>
  </div>
</div>

<div class="finish" id="finishView">
  <div class="trophy">🏆</div>
  <h2>Séance terminée !</h2>
  <p id="finishDay"></p>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="finishTime">—</div><div class="stat-lbl">Durée</div></div>
    <div class="stat"><div class="stat-val" id="finishSets">—</div><div class="stat-lbl">Séries</div></div>
    <div class="stat"><div class="stat-val" id="finishEx">—</div><div class="stat-lbl">Exercices</div></div>
  </div>
  <button onclick="resetWorkout()">🔁 Recommencer</button>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button class="btn-prev" id="btnPrev" onclick="prevEx()">←</button>
  <button class="btn-next" id="btnNext" onclick="nextEx()">Exercice suivant →</button>
</div>

<script>
const WORKOUTS = {
  lundi: {
    label: "🔴 Lundi — Poussée",
    exercises: [
      {name:"Arnold Press Haltères",muscle:"Épaules",emoji:"🏋️",sets:3,reps:"8-12",weight:"8-10",rest:90},
      {name:"Papillon bras tendus",muscle:"Pectoraux",emoji:"🦅",sets:4,reps:"11-13",weight:"44",rest:60},
      {name:"Élévations latérales",muscle:"Épaules",emoji:"🙆",sets:4,reps:"8-10",weight:"8",rest:60},
      {name:"Skull Crusher incliné",muscle:"Triceps",emoji:"💀",sets:4,reps:"14-16",weight:"6",rest:60},
      {name:"Presse à cuisse",muscle:"Quadriceps",emoji:"🦵",sets:4,reps:"5-10",weight:"125.7",rest:120},
      {name:"Élévation mollet machine",muscle:"Mollets",emoji:"🦶",sets:3,reps:"9-11",weight:"41.5",rest:60},
      {name:"Crunch assis machine",muscle:"Abdos",emoji:"🔥",sets:3,reps:"9-10",weight:"104",rest:60},
    ]
  },
  mercredi: {
    label: "🔵 Mercredi — Tirage",
    exercises: [
      {name:"Rangées prise serrée neutre",muscle:"Dos",emoji:"🚣",sets:4,reps:"10-11",weight:"36",rest:90},
      {name:"Rangées prise large pronation",muscle:"Dos",emoji:"💪",sets:3,reps:"12-13",weight:"45",rest:90},
      {name:"Curls biceps inclinés",muscle:"Biceps",emoji:"💪",sets:4,reps:"8-10",weight:"10",rest:60},
      {name:"Papillon inverse",muscle:"Deltoïdes post.",emoji:"🦅",sets:2,reps:"10-12",weight:"36",rest:60},
      {name:"Shrugs haltères",muscle:"Trapèzes",emoji:"🤷",sets:3,reps:"12-14",weight:"16",rest:60},
      {name:"Soulevé de terre roumain",muscle:"Ischios / Bas du dos",emoji:"🏋️",sets:4,reps:"8-10",weight:"16-18",rest:90},
      {name:"Extension du dos machine",muscle:"Lombaires",emoji:"🔙",sets:2,reps:"9-11",weight:"90",rest:60},
      {name:"Crunch à genoux poulie",muscle:"Abdos",emoji:"🔥",sets:3,reps:"10-12",weight:"27.5-37.5",rest:60},
    ]
  },
  vendredi: {
    label: "🟣 Vendredi — Full Body",
    exercises: [
      {name:"Développé couché",muscle:"Pectoraux",emoji:"🏋️",sets:3,reps:"12",weight:"32.5-40",rest:120},
      {name:"Tirage latéral prise large",muscle:"Dos",emoji:"🚣",sets:4,reps:"6-10",weight:"55",rest:90},
      {name:"Pec Deck bras tendus",muscle:"Pectoraux",emoji:"🦅",sets:5,reps:"11-13",weight:"44",rest:60},
      {name:"Extension triceps corde",muscle:"Triceps",emoji:"💪",sets:3,reps:"10-12",weight:"20",rest:60,warn:"⚠️ Trop lourd — alléger"},
      {name:"Curls stricts barre",muscle:"Biceps",emoji:"🦾",sets:3,reps:"11-13",weight:"17.5",rest:60},
      {name:"Papillon inverse",muscle:"Deltoïdes post.",emoji:"🦅",sets:2,reps:"10-11",weight:"35",rest:60},
      {name:"Extension de jambe machine",muscle:"Quadriceps",emoji:"🦵",sets:4,reps:"9-11",weight:"52.5",rest:90},
      {name:"Leg Curl assis",muscle:"Ischios",emoji:"🦵",sets:3,reps:"8-10",weight:"52.5",rest:90},
      {name:"Extension mollet machine",muscle:"Mollets",emoji:"🦶",sets:3,reps:"12-14",weight:"30",rest:60},
    ]
  }
};

// State
let currentDay = 'vendredi';
let currentExIdx = 0;
let setsData = {}; // {dayExKey: [{reps, weight, done}]}
let workoutStart = Date.now();
let workoutInterval = null;
let restInterval = null;
let restTotal = 0;
let restRemaining = 0;
let currentRestSec = 90;
let totalSetsDone = 0;

function dayExKey(day, exIdx) { return `${day}_${exIdx}`; }

function initSets(day, exIdx) {
  const k = dayExKey(day, exIdx);
  if (!setsData[k]) {
    const ex = WORKOUTS[day].exercises[exIdx];
    setsData[k] = Array.from({length: ex.sets}, () => ({
      reps: ex.reps, weight: ex.weight, done: false
    }));
  }
}

function getSets(day, exIdx) {
  initSets(day, exIdx);
  return setsData[dayExKey(day, exIdx)];
}

// Workout timer
function startWorkoutTimer() {
  workoutStart = Date.now();
  if (workoutInterval) clearInterval(workoutInterval);
  workoutInterval = setInterval(() => {
    const el = document.getElementById('workoutTimer');
    const s = Math.floor((Date.now() - workoutStart) / 1000);
    const h = String(Math.floor(s/3600)).padStart(2,'0');
    const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
    const ss = String(s%60).padStart(2,'0');
    el.textContent = `${h}:${m}:${ss}`;
  }, 1000);
}

// Rest timer
function startRest(seconds, label) {
  if (restInterval) clearInterval(restInterval);
  restTotal = seconds;
  restRemaining = seconds;
  document.getElementById('restOverlay').classList.add('active');
  document.getElementById('restExLabel').textContent = label || '';
  updateRestUI();
  restInterval = setInterval(() => {
    restRemaining--;
    updateRestUI();
    if (restRemaining <= 0) {
      clearInterval(restInterval);
      skipRest();
      // Vibrate if possible
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
    }
  }, 1000);
}

function updateRestUI() {
  const count = document.getElementById('restCount');
  const arc = document.getElementById('restArc');
  count.textContent = restRemaining > 0 ? restRemaining : '0';
  const r = 86, circ = 2 * Math.PI * r;
  const progress = restRemaining / restTotal;
  arc.style.strokeDasharray = circ;
  arc.style.strokeDashoffset = circ * (1 - progress);
}

function skipRest() {
  if (restInterval) clearInterval(restInterval);
  document.getElementById('restOverlay').classList.remove('active');
}

// Render
function render() {
  // Day pills
  const daySel = document.getElementById('daySel');
  daySel.innerHTML = '';
  Object.entries(WORKOUTS).forEach(([key, w]) => {
    const pill = document.createElement('button');
    pill.className = 'day-pill' + (key === currentDay ? ' active' : '');
    pill.textContent = w.label;
    pill.onclick = () => { currentDay = key; currentExIdx = 0; render(); };
    daySel.appendChild(pill);
  });

  const exercises = WORKOUTS[currentDay].exercises;

  // Strip
  const strip = document.getElementById('exStrip');
  strip.innerHTML = '';
  exercises.forEach((ex, i) => {
    const sets = getSets(currentDay, i);
    const allDone = sets.every(s => s.done);
    const thumb = document.createElement('div');
    thumb.className = 'ex-thumb' + (i === currentExIdx ? ' active' : '') + (allDone ? ' done-ex' : '');
    thumb.textContent = allDone ? '✅' : ex.emoji;
    thumb.onclick = () => { currentExIdx = i; render(); };
    strip.appendChild(thumb);
  });
  // Scroll active into view
  const activeThumb = strip.children[currentExIdx];
  if (activeThumb) activeThumb.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});

  const ex = exercises[currentExIdx];
  const sets = getSets(currentDay, currentExIdx);
  currentRestSec = ex.rest;

  document.getElementById('exEmoji').textContent = ex.emoji;
  document.getElementById('exName').textContent = ex.name;
  document.getElementById('exMuscle').textContent = ex.muscle;
  const warnEl = document.getElementById('exWarn');
  if (ex.warn) { warnEl.textContent = ex.warn; warnEl.style.display = ''; }
  else warnEl.style.display = 'none';

  // Rest button label
  const m = Math.floor(ex.rest/60), s = ex.rest%60;
  document.getElementById('restBtnLabel').textContent = `${m}:${String(s).padStart(2,'0')}`;

  // Sets list
  const list = document.getElementById('setsList');
  list.innerHTML = '';
  sets.forEach((set, i) => {
    const row = document.createElement('div');
    row.className = 'set-row' + (set.done ? ' done' : '');
    row.innerHTML = `
      <div class="set-num">${i+1}</div>
      <input class="set-val" value="${set.reps}" onchange="setChanged(${i},'reps',this.value)" inputmode="text"/>
      <input class="set-val" value="${set.weight}" onchange="setChanged(${i},'weight',this.value)" inputmode="decimal"/>
      <div class="set-check ${set.done?'checked':''}" onclick="toggleSet(${i})">${set.done?'✓':''}</div>
    `;
    list.appendChild(row);
  });

  // Nav buttons
  document.getElementById('btnPrev').disabled = currentExIdx === 0;
  const isLast = currentExIdx === exercises.length - 1;
  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = isLast ? '🏁 Terminer la séance' : 'Exercice suivant →';
  btnNext.disabled = false;

  // Finish view
  document.getElementById('mainView').style.display = '';
  document.getElementById('finishView').classList.remove('active');
}

function setChanged(setIdx, field, val) {
  getSets(currentDay, currentExIdx)[setIdx][field] = val;
}

function toggleSet(setIdx) {
  const sets = getSets(currentDay, currentExIdx);
  const set = sets[setIdx];
  set.done = !set.done;
  if (set.done) {
    totalSetsDone++;
    const ex = WORKOUTS[currentDay].exercises[currentExIdx];
    startRest(ex.rest, `Repos — ${ex.name}`);
  } else {
    totalSetsDone = Math.max(0, totalSetsDone - 1);
  }
  render();
}

function addSet() {
  const sets = getSets(currentDay, currentExIdx);
  const last = sets[sets.length-1] || {reps:'10', weight:'0', done:false};
  sets.push({reps: last.reps, weight: last.weight, done: false});
  render();
}

function removeSet() {
  const sets = getSets(currentDay, currentExIdx);
  if (sets.length > 1) { sets.pop(); render(); }
}

function nextEx() {
  const exercises = WORKOUTS[currentDay].exercises;
  if (currentExIdx < exercises.length - 1) {
    currentExIdx++;
    render();
  } else {
    showFinish();
  }
}

function prevEx() {
  if (currentExIdx > 0) { currentExIdx--; render(); }
}

function showFinish() {
  const elapsed = Math.floor((Date.now() - workoutStart) / 1000);
  const h = String(Math.floor(elapsed/3600)).padStart(2,'0');
  const m = String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const s = String(elapsed%60).padStart(2,'0');
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('finishView').classList.add('active');
  document.getElementById('finishDay').textContent = WORKOUTS[currentDay].label;
  document.getElementById('finishTime').textContent = elapsed < 3600 ? `${m}:${s}` : `${h}:${m}:${s}`;
  document.getElementById('finishSets').textContent = totalSetsDone;
  document.getElementById('finishEx').textContent = WORKOUTS[currentDay].exercises.length;
  if (workoutInterval) clearInterval(workoutInterval);
}

function resetWorkout() {
  setsData = {};
  totalSetsDone = 0;
  currentExIdx = 0;
  startWorkoutTimer();
  render();
}

// Init
startWorkoutTimer();
render();
</script>
</body>
</html>
